name: tests

on:
  push:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: warn

  e2e-smoke:
    needs: quality
    if: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_DEV != '' && secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY_DEV != '' && secrets.SUPABASE_SERVICE_ROLE_KEY_DEV != '' && secrets.NEXT_PUBLIC_SUPABASE_DB_SCHEMA_DEV != '' && secrets.SUPABASE_PLAYER_PHOTOS_BUCKET_DEV != '' && secrets.E2E_ADMIN_EMAIL != '' && secrets.E2E_ADMIN_PASSWORD != '' && secrets.E2E_ORG_SLUG != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Write .env.test
        run: |
          cat <<'EOF' > .env.test
          SUPABASE_TARGET_ENV=development
          NEXT_PUBLIC_SUPABASE_URL_DEV=${{ secrets.NEXT_PUBLIC_SUPABASE_URL_DEV }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY_DEV=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY_DEV }}
          SUPABASE_SERVICE_ROLE_KEY_DEV=${{ secrets.SUPABASE_SERVICE_ROLE_KEY_DEV }}
          NEXT_PUBLIC_SUPABASE_DB_SCHEMA_DEV=${{ secrets.NEXT_PUBLIC_SUPABASE_DB_SCHEMA_DEV }}
          SUPABASE_PLAYER_PHOTOS_BUCKET_DEV=${{ secrets.SUPABASE_PLAYER_PHOTOS_BUCKET_DEV }}
          E2E_BASE_URL=http://127.0.0.1:3001
          APP_URL_DEV=http://127.0.0.1:3001
          NEXT_PUBLIC_APP_URL_DEV=http://127.0.0.1:3001
          E2E_ADMIN_EMAIL=${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD=${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ORG_SLUG=${{ secrets.E2E_ORG_SLUG }}
          E2E_ORG_NAME=${{ secrets.E2E_ORG_NAME }}
          SUPER_ADMIN_EMAIL=${{ secrets.SUPER_ADMIN_EMAIL }}
          EOF

      - name: Run smoke E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: warn
